<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morissette</title>
  <style>
    @font-face {
      font-family: 'iaWriter';
      src: url('iAWriterMonoS-Regular.woff2') format('woff2'),
           url('iAWriterMonoS-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #33333A;
      --hover: #555;
      --muted: #999;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'iaWriter', monospace;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .column {
      min-width: fit-content;
      min-height: 100vh;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .text-list { display: flex; flex-direction: column; gap: 2px; }

    .joke-item {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 0; cursor: default; white-space: nowrap;
    }
    .joke-item:hover { color: var(--hover); }
    .joke {
      color: var(--muted); opacity: 0;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .joke-item:hover .joke { opacity: 1; }

    .link-item {
      display: inline-flex; align-items: center; gap: 5px;
      text-decoration: none; color: inherit;
      padding: 2px 0; transition: color 0.15s; white-space: nowrap;
      cursor: pointer; background: none; border: none;
      font-family: inherit; font-size: inherit; font-weight: inherit;
      letter-spacing: inherit; text-transform: inherit;
    }
    .link-item:hover { color: var(--hover); }
    .link-arrow { color: var(--muted); opacity: 0; transition: opacity 0.15s; }
    .link-item:hover .link-arrow { opacity: 1; }

    .right { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }

    .column > * {
      opacity: 0;
      transform: translateY(5px);
      animation: fadeUp 0.35s forwards ease-out;
    }
    .column > *:nth-child(1) { animation-delay: 0.05s; }
    .column > *:nth-child(2) { animation-delay: 0.12s; }
    .column > *:nth-child(3) { animation-delay: 0.19s; }
    .column > *:nth-child(4) { animation-delay: 0.26s; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <aside class="column">
    <div class="text-list">
      <div class="joke-item">Guillaume Morissette<span class="joke">—</span></div>
      <div class="joke-item">Writer <span class="joke">—</span></div>
      <div class="joke-item">Content Designer <span class="joke">—</span></div>
    </div>
    <div class="text-list">
      <div class="joke-item">Based in Toronto <span class="joke">—</span></div>
    </div>
    <div class="text-list">
      <a href="/cdn-cgi/l/email-protection#bbd6dac9d0fbdec3dad6cbd7de95d8d4d6" class="link-item">Email <span class="link-arrow">[↗]</span></a>
    </div>
    <div class="text-list">
      <a href="https://www.instagram.com/anxietyissue/" class="link-item">Instagram <span class="link-arrow">[↗]</span></a>
      <a href="https://www.linkedin.com/in/guillaumemorissette/" class="link-item">LinkedIn <span class="link-arrow">[↗]</span></a>
    </div>
  </aside>

  <div class="right">
    <canvas id="c"></canvas>
  </div>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    function openPortfolio() { window.location.href = 'portfolio-work.html'; }

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const STAR_CHARS  = ['.', '·', '+', '✦', '*', '⋆', '×'];
    const TRAIL_CHARS = ['-', '–', '·', '.', "'", '`', ','];
    // Comet trail uses longer dash-like chars for a more dramatic tail
    const COMET_TRAIL = ['—', '–', '-', '·', '·', '.', '.', '`', "'", ' '];

    let W, H;
    let stars    = [];
    let shooters = [];
    let comets   = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
      buildStars();
    }

    function buildStars() {
      stars = [];
      const count = Math.floor((W * H) / 5800);
      for (let i = 0; i < count; i++) {
        const isBright = Math.random() < 0.12; // occasional brighter stars
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          ch: STAR_CHARS[Math.floor(Math.random() * STAR_CHARS.length)],
          baseAlpha:     isBright ? 0.35 + Math.random() * 0.2 : 0.1 + Math.random() * 0.15,
          twinkleRange:  isBright ? 0.18 + Math.random() * 0.12 : 0.08 + Math.random() * 0.08,
          alpha: 0,
          twinkleOffset: Math.random() * Math.PI * 2,
          twinkleSpeed:  0.012 + Math.random() * 0.025, // faster, more varied
          size: isBright ? 14 : (Math.random() < 0.15 ? 13 : 11),
        });
      }
    }

    // ── Shooting stars ──────────────────────────────────────────────
    function spawnShooter() {
      const angle  = (Math.PI * 0.55) + (Math.random() - 0.5) * 0.4;
      const speed  = 5 + Math.random() * 5;
      const startX = W * 0.2 + Math.random() * W * 0.8;
      const startY = -10 + Math.random() * H * 0.4;
      shooters.push({
        x: startX, y: startY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        trail: [], trailLen: 5 + Math.floor(Math.random() * 5),
        head: STAR_CHARS[Math.floor(Math.random() * 3)],
        dead: false,
      });
    }

    function scheduleShooter() {
      spawnShooter();
      if (Math.random() < 0.3) setTimeout(spawnShooter, 120 + Math.random() * 200);
      setTimeout(scheduleShooter, 1800 + Math.random() * 3200);
    }


    // ── UFO ─────────────────────────────────────────────────────────
    let ufos = [];

    function spawnUFO() {
      const fromLeft = Math.random() < 0.5;
      const startX   = fromLeft ? -30 : W + 30;
      const startY   = H * 0.15 + Math.random() * H * 0.65;
      const driftVx  = (fromLeft ? 1 : -1) * (0.4 + Math.random() * 0.5);
      const driftVy  = (Math.random() - 0.5) * 0.3;
      const zipAngle = fromLeft
        ? -0.6 + Math.random() * 1.2
        : Math.PI + (-0.6 + Math.random() * 1.2);
      const zipSpeed = 9 + Math.random() * 6;
      ufos.push({
        x: startX, y: startY,
        vx: driftVx, vy: driftVy,
        phase: 'drift',
        driftFrames: 160 + Math.floor(Math.random() * 120),
        pauseFrames:  18 + Math.floor(Math.random() * 25),
        frameCount: 0,
        zipVx: Math.cos(zipAngle) * zipSpeed,
        zipVy: Math.sin(zipAngle) * zipSpeed,
        dead: false,
      });
    }

    function scheduleUFO() {
      spawnUFO();
      setTimeout(scheduleUFO, 12000 + Math.random() * 16000);
    }


    function schedulePlanet() {
      spawnPlanet();
      setTimeout(schedulePlanet, 18000 + Math.random() * 22000);
    }

    // ── Comets ──────────────────────────────────────────────────────
    function spawnComet() {
      // Comets come from top-right, travel slowly down-left
      const angle  = (Math.PI * 0.62) + (Math.random() - 0.5) * 0.2;
      const speed  = 1.1 + Math.random() * 0.8;   // much slower than shooters
      const startX = W * 0.4 + Math.random() * W * 0.6;
      const startY = -20;
      const trailLen = 18 + Math.floor(Math.random() * 10); // long tail
      comets.push({
        x: startX, y: startY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        trail: [], trailLen,
        dead: false,
      });
    }

    function scheduleComet() {
      spawnComet();
      // Comets are rare — every 8–18 seconds
      setTimeout(scheduleComet, 8000 + Math.random() * 10000);
    }

    // ── Draw loop ────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      // Background stars
      for (const s of stars) {
        s.twinkleOffset += s.twinkleSpeed;
        s.alpha = s.baseAlpha + Math.sin(s.twinkleOffset) * s.twinkleRange;
        ctx.font      = `${s.size}px iaWriter, monospace`;
        ctx.fillStyle = `rgba(51,51,58,${Math.max(0, s.alpha)})`;
        ctx.fillText(s.ch, s.x, s.y);
      }

      // Shooting stars
      for (const sh of shooters) {
        if (sh.dead) continue;
        sh.trail.unshift({ x: sh.x, y: sh.y });
        if (sh.trail.length > sh.trailLen) sh.trail.pop();
        sh.x += sh.vx;
        sh.y += sh.vy;
        if (sh.x < -40 || sh.y > H + 40 || sh.x > W + 40) { sh.dead = true; continue; }

        ctx.font = `13px iaWriter, monospace`;
        for (let i = 0; i < sh.trail.length; i++) {
          const t     = sh.trail[i];
          const alpha = (1 - i / sh.trailLen) * 0.7;
          const ch    = i === 0 ? sh.head : TRAIL_CHARS[Math.min(i, TRAIL_CHARS.length - 1)];
          ctx.fillStyle = `rgba(51,51,58,${alpha})`;
          ctx.fillText(ch, t.x, t.y);
        }
        ctx.font      = `14px iaWriter, monospace`;
        ctx.fillStyle = `rgba(51,51,58,0.9)`;
        ctx.fillText(sh.head, sh.x, sh.y);
      }
      shooters = shooters.filter(s => !s.dead);




      // UFOs
      for (const ufo of ufos) {
        if (ufo.dead) continue;
        ufo.frameCount++;

        if (ufo.phase === 'drift') {
          ufo.x += ufo.vx;
          ufo.y += ufo.vy;
          if (ufo.frameCount >= ufo.driftFrames) {
            ufo.phase = 'pause';
            ufo.frameCount = 0;
          }
        } else if (ufo.phase === 'pause') {
          // Blink during pause
          if (ufo.frameCount >= ufo.pauseFrames) {
            ufo.phase = 'zip';
            ufo.frameCount = 0;
          }
        } else if (ufo.phase === 'zip') {
          ufo.x += ufo.zipVx;
          ufo.y += ufo.zipVy;
          if (ufo.x < -80 || ufo.x > W + 80 || ufo.y < -80 || ufo.y > H + 80) {
            ufo.dead = true; continue;
          }
        }

        // Draw UFO: [-] during drift/zip, blink to [*] during pause
        const isPause  = ufo.phase === 'pause';
        const blinkOn  = isPause ? (Math.floor(ufo.frameCount / 4) % 2 === 0) : true;
        const ufoChar  = isPause ? (blinkOn ? '[-]' : '   ') : '[-]';
        const alpha    = ufo.phase === 'zip' ? Math.max(0, 1 - ufo.frameCount / 18) : 0.7;

        ctx.font      = '13px iaWriter, monospace';
        ctx.fillStyle = `rgba(51,51,58,${alpha})`;
        ctx.fillText(ufoChar, ufo.x, ufo.y);
      }
      ufos = ufos.filter(u => !u.dead);

      // Comets
      for (const cm of comets) {
        if (cm.dead) continue;
        cm.trail.unshift({ x: cm.x, y: cm.y });
        if (cm.trail.length > cm.trailLen) cm.trail.pop();
        cm.x += cm.vx;
        cm.y += cm.vy;
        if (cm.x < -60 || cm.y > H + 60 || cm.x > W + 60) { cm.dead = true; continue; }

        // Draw tail — chars get progressively smaller and more faded
        for (let i = 0; i < cm.trail.length; i++) {
          const t        = cm.trail[i];
          const progress = i / cm.trailLen;
          const alpha    = Math.pow(1 - progress, 1.4) * 0.65;
          const size     = 15 - progress * 5; // shrinks from 15px → 10px
          const ch       = COMET_TRAIL[Math.min(i, COMET_TRAIL.length - 1)];
          ctx.font      = `${size}px iaWriter, monospace`;
          ctx.fillStyle = `rgba(51,51,58,${alpha})`;
          ctx.fillText(ch, t.x, t.y);
        }

        // Comet head — slightly larger, fully opaque
        ctx.font      = `16px iaWriter, monospace`;
        ctx.fillStyle = `rgba(51,51,58,0.88)`;
        ctx.fillText('✦', cm.x, cm.y);
      }
      comets = comets.filter(c => !c.dead);

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    setTimeout(scheduleShooter, 800);
    setTimeout(scheduleComet, 3000);   // first comet after 3s
    setTimeout(scheduleUFO,   7000);   //
